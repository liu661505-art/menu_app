<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点菜系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

  /* ===== Header ===== */
  .header { background: linear-gradient(135deg, #ff6b35, #e63946); color: #fff; padding: 16px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 22px; font-weight: 700; white-space: nowrap; }
  .search-box { flex: 1; min-width: 180px; max-width: 360px; position: relative; }
  .search-box input { width: 100%; padding: 8px 12px 8px 36px; border: none; border-radius: 20px; font-size: 14px; outline: none; }
  .search-box::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
  .cart-badge { position: relative; cursor: pointer; font-size: 24px; padding: 4px 8px; user-select: none; }
  .cart-badge .count { position: absolute; top: -4px; right: -4px; background: #fff; color: #e63946; font-size: 12px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

  /* ===== Layout ===== */
  .main { display: flex; max-width: 1200px; margin: 0 auto; padding: 16px; gap: 20px; }
  .content { flex: 1; min-width: 0; }

  /* ===== Categories ===== */
  .categories { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .cat-btn { padding: 8px 18px; border: 2px solid #e0e0e0; border-radius: 24px; background: #fff; font-size: 15px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .cat-btn:hover { border-color: #ff6b35; color: #ff6b35; }
  .cat-btn.active { background: #ff6b35; color: #fff; border-color: #ff6b35; }

  /* ===== Items Grid ===== */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .2s; display: flex; flex-direction: column; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
  .card-img { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 56px; background: #fafafa; user-select: none; }
  .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; }
  .card-name { font-size: 16px; font-weight: 600; }
  .card-desc { font-size: 13px; color: #999; margin-top: 4px; line-height: 1.4; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .card-price { font-size: 18px; font-weight: 700; color: #e63946; }
  .card-price::before { content: "¥"; font-size: 13px; }
  .btn-add { width: 32px; height: 32px; border-radius: 50%; border: none; background: #ff6b35; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
  .btn-add:hover { background: #e55a2b; }

  /* ===== Cart Panel ===== */
  .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; }
  .cart-overlay.open { display: block; }
  .cart-panel { position: fixed; top: 0; right: -400px; width: 400px; max-width: 100vw; height: 100%; background: #fff; z-index: 210; transition: right .3s; display: flex; flex-direction: column; }
  .cart-panel.open { right: 0; }
  .cart-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
  .cart-header h2 { font-size: 18px; }
  .btn-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
  .btn-close:hover { color: #333; }
  .cart-list { flex: 1; overflow-y: auto; padding: 12px 20px; }
  .cart-empty { text-align: center; color: #ccc; padding: 60px 0; font-size: 15px; }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
  .cart-item-img { font-size: 28px; width: 40px; text-align: center; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 15px; font-weight: 500; }
  .cart-item-price { font-size: 13px; color: #e63946; margin-top: 2px; }
  .cart-item-qty { display: flex; align-items: center; gap: 8px; }
  .cart-item-qty button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cart-item-qty button:hover { border-color: #ff6b35; color: #ff6b35; }
  .cart-item-qty .num { min-width: 24px; text-align: center; font-weight: 600; }
  .cart-item-subtotal { font-size: 15px; font-weight: 600; color: #e63946; white-space: nowrap; }
  .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 4px; }
  .btn-del:hover { color: #e63946; }
  .cart-footer { padding: 16px 20px; border-top: 1px solid #eee; }
  .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 16px; }
  .cart-total .amount { font-size: 22px; font-weight: 700; color: #e63946; }
  .btn-checkout { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #ff6b35, #e63946); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn-checkout:hover { opacity: .9; }
  .btn-checkout:disabled { opacity: .4; cursor: not-allowed; }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .header-inner { gap: 10px; }
    .header h1 { font-size: 18px; }
    .main { padding: 12px; flex-direction: column; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .card-img { height: 100px; font-size: 40px; }
    .cart-panel { width: 100vw; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1>🍽️ 点菜系统</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索菜品..." autocomplete="off">
    </div>
    <div class="cart-badge" id="cartToggle" title="查看购物车">
      🛒<span class="count" id="cartCount">0</span>
    </div>
  </div>
</header>

<!-- Main -->
<div class="main">
  <div class="content">
    <div class="categories" id="categories"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Cart overlay -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- Cart panel -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>🛒 购物车</h2>
    <button class="btn-close" id="cartClose">✕</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>合计</span>
      <span class="amount" id="cartTotal">¥0</span>
    </div>
    <button class="btn-checkout" id="btnCheckout" disabled>去结算</button>
  </div>
</div>

<script>
// ===== State =====
let menuData = null;         // { categories, items }
let cart = {};               // { itemId: { data, qty } }
let currentCategory = 'all';
let searchTerm = '';
let debounceTimer = null;

// ===== DOM refs =====
const $ = id => document.getElementById(id);
const gridEl = $('grid');
const categoriesEl = $('categories');
const cartListEl = $('cartList');
const cartCountEl = $('cartCount');
const cartTotalEl = $('cartTotal');
const cartPanel = $('cartPanel');
const cartOverlay = $('cartOverlay');
const btnCheckout = $('btnCheckout');

// ===== API =====
async function fetchMenu() {
  const params = new URLSearchParams();
  if (searchTerm) params.set('search', searchTerm);
  if (currentCategory !== 'all') params.set('category', currentCategory);
  const qs = params.toString();
  const url = '/api/menu' + (qs ? '?' + qs : '');
  const res = await fetch(url);
  return res.json();
}

// ===== Render =====
function renderCategories(categories) {
  let html = `<button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" data-cat="all">🔥 全部</button>`;
  for (const c of categories) {
    html += `<button class="cat-btn ${currentCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.icon} ${c.name}</button>`;
  }
  categoriesEl.innerHTML = html;
}

function renderGrid(items) {
  if (!items.length) {
    gridEl.innerHTML = '<div style="text-align:center;padding:60px 0;color:#ccc;font-size:16px;grid-column:1/-1;">😅 没有找到相关菜品</div>';
    return;
  }
  let html = '';
  for (const item of items) {
    const inCart = cart[item.id];
    html += `
      <div class="card">
        <div class="card-img">${item.image || '🍽️'}</div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description || ''}</div>
          <div class="card-footer">
            <span class="card-price">${item.price}</span>
            <button class="btn-add" data-id="${item.id}">+</button>
          </div>
        </div>
      </div>`;
  }
  gridEl.innerHTML = html;
}

function renderCart() {
  const entries = Object.values(cart);
  if (!entries.length) {
    cartListEl.innerHTML = '<div class="cart-empty">🛒 购物车是空的</div>';
    btnCheckout.disabled = true;
    updateCartSummary();
    return;
  }
  btnCheckout.disabled = false;
  let html = '';
  for (const entry of entries) {
    const { data, qty } = entry;
    html += `
      <div class="cart-item" data-id="${data.id}">
        <div class="cart-item-img">${data.image || '🍽️'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${data.name}</div>
          <div class="cart-item-price">¥${data.price}</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-dec" data-id="${data.id}">−</button>
          <span class="num">${qty}</span>
          <button class="qty-inc" data-id="${data.id}">+</button>
        </div>
        <span class="cart-item-subtotal">¥${(data.price * qty).toFixed(2)}</span>
        <button class="btn-del" data-id="${data.id}">✕</button>
      </div>`;
  }
  cartListEl.innerHTML = html;
  updateCartSummary();
}

function updateCartSummary() {
  const entries = Object.values(cart);
  const totalCount = entries.reduce((s, e) => s + e.qty, 0);
  const totalPrice = entries.reduce((s, e) => s + e.data.price * e.qty, 0);
  cartCountEl.textContent = totalCount;
  cartTotalEl.textContent = '¥' + totalPrice.toFixed(2);
}

// ===== Cart Actions =====
function addToCart(item) {
  if (cart[item.id]) {
    cart[item.id].qty++;
  } else {
    cart[item.id] = { data: item, qty: 1 };
  }
  renderCart();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) {
    delete cart[id];
  }
  renderCart();
}

function removeFromCart(id) {
  delete cart[id];
  renderCart();
}

// ===== Load =====
async function loadMenu() {
  const data = await fetchMenu();
  menuData = data;
  renderCategories(data.categories);
  renderGrid(data.items);
}

// ===== Events =====

// Categories
categoriesEl.addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  currentCategory = btn.dataset.cat;
  renderCategories(menuData.categories);
  loadMenu();
});

// Add to cart (delegated)
gridEl.addEventListener('click', e => {
  const btn = e.target.closest('.btn-add');
  if (!btn) return;
  const id = +btn.dataset.id;
  const item = menuData.items.find(i => i.id === id);
  if (item) addToCart(item);
});

// Cart +/- / delete (delegated)
cartListEl.addEventListener('click', e => {
  const id = +e.target.dataset.id;
  if (!id) return;
  if (e.target.classList.contains('qty-inc')) changeQty(id, 1);
  else if (e.target.classList.contains('qty-dec')) changeQty(id, -1);
  else if (e.target.classList.contains('btn-del')) removeFromCart(id);
});

// Search with debounce
$('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    loadMenu();
  }, 300);
});

// Cart toggle
function openCart() { cartPanel.classList.add('open'); cartOverlay.classList.add('open'); }
function closeCart() { cartPanel.classList.remove('open'); cartOverlay.classList.remove('open'); }
$('cartToggle').addEventListener('click', openCart);
$('cartClose').addEventListener('click', closeCart);
cartOverlay.addEventListener('click', closeCart);

// Checkout
btnCheckout.addEventListener('click', () => {
  const entries = Object.values(cart);
  const total = entries.reduce((s, e) => s + e.data.price * e.qty, 0);
  const names = entries.map(e => `${e.data.name}×${e.qty}`).join('、');
  alert(`✅ 下单成功！\n\n${names}\n\n总计：¥${total.toFixed(2)}`);
});

// ===== Init =====
loadMenu();
</script>
</body>
</html>
